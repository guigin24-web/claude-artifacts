let activeTab = 'all';
let activeSearch = '';

function tagHTML(type) {
  const labels = { template: 'Delegation template', description: 'Description technique', discernment: 'Discernment pattern', diligence: 'Diligence pattern' };
  return `<span class="card-tag tag-${type}">${labels[type]}</span>`;
}

function renderCard(d) {
  const bodyId = `body-${d.id}`;
  const chevronId = `chev-${d.id}`;
  let body = '';

  if (d.pattern) {
    body += `<div class="field-label">Core pattern</div><div class="code-block">${d.pattern}</div>`;
  }
  if (d.template) {
    body += `<div class="field-label">Template</div><div class="code-block">${escHtml(d.template)}</div>`;
  }
  if (d.techniques) {
    body += `<div class="field-label">Techniques</div><div class="prose"><ul>${d.techniques.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
  }
  if (d.signals) {
    body += `<div class="field-label">Pass / warn signals</div><div class="signal-row">`;
    d.signals.forEach(s => {
      body += `<div class="signal-card ${s.pass ? 'signal-pass' : 'signal-warn'}">
        <div class="signal-icon ${s.pass ? 'pass' : 'warn'}">${s.pass ? '✓ pass' : '⚠ watch'}</div>
        <div class="prose">${s.text}</div>
      </div>`;
    });
    body += `</div>`;
  }
  if (d.example) {
    body += `<div class="field-label">Reference example</div><div class="example-box">${d.example}</div>`;
  }
  if (d.context) {
    body += `<div class="field-label">When to use</div><div class="prose">${d.context}</div>`;
  }

  return `<div class="card" data-type="${d.type}" data-keywords="${d.keywords}" data-title="${d.title.toLowerCase()}">
    <div class="card-header" onclick="toggleCard(${d.id})">
      ${tagHTML(d.type)}
      <span class="card-title">${d.title}</span>
      <span class="card-sub">${d.sub}</span>
      <span class="chevron" id="${chevronId}">▶</span>
    </div>
    <div class="card-body" id="${bodyId}">${body}</div>
  </div>`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleCard(id) {
  const body = document.getElementById(`body-${id}`);
  const chev = document.getElementById(`chev-${id}`);
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
}

function filterTab(el, tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  activeTab = tab;
  render();
}

function filterCards() {
  activeSearch = document.getElementById('search').value.toLowerCase();
  render();
}

function render() {
  const container = document.getElementById('cards-container');
  const groups = { template: [], description: [], discernment: [], diligence: [] };

  DATA.forEach(d => {
    if (activeTab !== 'all' && d.type !== activeTab) return;
    const searchable = d.title.toLowerCase() + ' ' + d.keywords;
    if (activeSearch && !searchable.includes(activeSearch)) return;
    groups[d.type].push(d);
  });

  const labels = {
    template: 'Delegation templates',
    description: 'Description techniques',
    discernment: 'Discernment patterns',
    diligence: 'Diligence patterns'
  };

  let html = '';
  let total = 0;
  Object.entries(groups).forEach(([type, items]) => {
    if (!items.length) return;
    total += items.length;
    if (activeTab === 'all') html += `<div class="section-label">${labels[type]}</div>`;
    items.forEach(d => { html += renderCard(d); });
  });

  if (!total) html = `<div class="no-results">No results for "${activeSearch}"</div>`;
  container.innerHTML = html;
}

render();
</script>
